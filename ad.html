<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>يُسر | إعلان موشن جرافيك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" href="assets/img/Yusr.png" type="image/png">
  <style>
    :root {
      --primary: #5B7A23; --p2: #7FA735; --accent: #76B041; --dark: #14210C;
      --grad: linear-gradient(135deg, #7FA735 0%, #5B7A23 55%, #263A14 100%);
      --lime: #bce08a; --soft: #c4d8aa;
      --T: 18s;
    }
    * { box-sizing: border-box; margin: 0; padding: 0 }
    html, body { height: 100% }
    body {
      font-family: 'Cairo', sans-serif; background: #0c1507;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    /* Stage 1080x1080, scaled to fit viewport */
    .stage {
      width: 1080px; height: 1080px; position: relative; overflow: hidden;
      transform: scale(var(--s, 1)); transform-origin: center center;
      background:
        radial-gradient(120% 90% at 80% -10%, #25401a 0%, transparent 55%),
        radial-gradient(120% 90% at 10% 110%, #1f3514 0%, transparent 55%),
        linear-gradient(160deg, #16240d 0%, #0e1808 100%);
      color: #fff;
    }
    /* Ambient layers */
    .grid-bg { position: absolute; inset: -2px; opacity: .07;
      background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px);
      background-size: 70px 70px; animation: gridmove 9s linear infinite; }
    @keyframes gridmove { to { background-position: 70px 70px } }
    .blob { position: absolute; border-radius: 50%; filter: blur(50px); opacity: .5 }
    .blob.a { width: 520px; height: 520px; background: #3f6b1e; top: -160px; right: -120px; animation: float1 11s ease-in-out infinite }
    .blob.b { width: 460px; height: 460px; background: #2c4a16; bottom: -160px; left: -120px; animation: float2 13s ease-in-out infinite }
    @keyframes float1 { 50% { transform: translate(-40px, 50px) scale(1.1) } }
    @keyframes float2 { 50% { transform: translate(40px, -40px) scale(1.08) } }

    .watermark { position: absolute; top: 46px; right: 54px; display: flex; align-items: center; gap: 12px; z-index: 6; opacity: .9 }
    .watermark img { width: 46px; height: 46px; background: #fff; border-radius: 12px; padding: 5px }
    .watermark b { font-size: 30px; font-weight: 900 }

    /* Scenes */
    .scene { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 90px; opacity: 0; }
    .sc1 { animation: sc1 var(--T) infinite } .sc2 { animation: sc2 var(--T) infinite }
    .sc3 { animation: sc3 var(--T) infinite } .sc4 { animation: sc4 var(--T) infinite }
    .sc5 { animation: sc5 var(--T) infinite }
    @keyframes sc1 { 0%{opacity:0;transform:scale(1.05)} 2%{opacity:1;transform:scale(1)} 14%{opacity:1} 16%,100%{opacity:0;transform:scale(.97)} }
    @keyframes sc2 { 0%,16%{opacity:0;transform:translateY(28px)} 19%{opacity:1;transform:translateY(0)} 32%{opacity:1} 34%,100%{opacity:0;transform:translateY(-24px)} }
    @keyframes sc3 { 0%,34%{opacity:0;transform:scale(.95)} 37%{opacity:1;transform:scale(1)} 56%{opacity:1} 58%,100%{opacity:0;transform:scale(1.03)} }
    @keyframes sc4 { 0%,58%{opacity:0} 61%{opacity:1} 78%{opacity:1} 80%,100%{opacity:0} }
    @keyframes sc5 { 0%,80%{opacity:0;transform:translateY(28px)} 83%{opacity:1;transform:translateY(0)} 99%{opacity:1} 100%{opacity:0} }

    /* Scene 1 — Brand */
    .badge-logo { width: 200px; height: 200px; border-radius: 48px; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 30px 70px rgba(0,0,0,.4); animation: pop 1.2s cubic-bezier(.2,.9,.3,1.3) both; }
    .badge-logo img { width: 140px; height: 140px }
    @keyframes pop { from { transform: scale(.4); opacity: 0 } to { transform: scale(1); opacity: 1 } }
    .brand-name { font-size: 120px; font-weight: 900; margin-top: 30px; letter-spacing: -2px }
    .brand-sub { font-size: 38px; color: var(--soft); margin-top: 6px; font-weight: 700 }
    .rule { width: 120px; height: 7px; border-radius: 4px; background: linear-gradient(90deg, var(--p2), var(--lime)); margin: 30px auto 0 }

    h2.line { font-size: 76px; font-weight: 900; line-height: 1.2 }
    .g { color: var(--lime) }
    .big-emoji { font-size: 120px; margin-bottom: 20px }

    /* Scene 2 — problem */
    .paper { width: 360px; height: 240px; background: #f4efe2; border-radius: 18px; position: relative; transform: rotate(-6deg); box-shadow: 0 24px 50px rgba(0,0,0,.45); margin-bottom: 40px; overflow: hidden }
    .paper::before { content: ""; position: absolute; inset: 26px; background: repeating-linear-gradient(#cdbf9b 0 3px, transparent 3px 30px) }
    .x-mark { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 150px; color: #c0392b; text-shadow: 0 6px 16px rgba(0,0,0,.3); animation: xpulse 1.4s ease-in-out infinite }
    @keyframes xpulse { 50% { transform: scale(1.12) } }

    /* Scene 3 — AUREX tap */
    .tap { position: relative; width: 560px; height: 360px; margin: 0 auto 30px }
    .phone { position: absolute; width: 168px; height: 330px; border-radius: 30px; background: linear-gradient(160deg, #1e3413, #0e1808); border: 3px solid #3a5a22; box-shadow: 0 24px 60px rgba(0,0,0,.5); display: flex; flex-direction: column; align-items: center; padding-top: 26px; }
    .phone img { width: 54px; height: 54px; background: #fff; border-radius: 12px; padding: 4px }
    .phone .ln { width: 70%; height: 9px; border-radius: 6px; background: rgba(255,255,255,.18); margin-top: 14px }
    .phone .ln.s { width: 45% }
    .phone.left { right: 70px; top: 20px; transform: rotate(-9deg) }
    .phone.right { left: 70px; top: 20px; transform: rotate(9deg) }
    .pulse { position: absolute; left: 50%; top: 52%; width: 60px; height: 60px; margin: -30px 0 0 -30px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 40px var(--lime); animation: tapglow 1.6s ease-out infinite }
    .pulse::after, .pulse::before { content: ""; position: absolute; inset: 0; border-radius: 50%; border: 3px solid var(--lime); animation: ring 1.6s ease-out infinite }
    .pulse::before { animation-delay: .8s }
    @keyframes ring { from { transform: scale(1); opacity: .9 } to { transform: scale(3.6); opacity: 0 } }
    @keyframes tapglow { 50% { transform: scale(1.18) } }
    .check-badge { display: inline-flex; align-items: center; gap: 12px; background: var(--grad); color: #fff; font-size: 30px; font-weight: 800; padding: 14px 28px; border-radius: 999px; margin-top: 8px; animation: pop 1s ease both; box-shadow: 0 14px 30px rgba(0,0,0,.35) }
    .aurex-tag { font-size: 30px; color: var(--lime); font-weight: 800; letter-spacing: 1px; margin-top: 22px }

    /* Scene 4 — features */
    .feat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 760px }
    .fcard { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14); border-radius: 24px; padding: 36px 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .fcard i { font-size: 56px; color: var(--lime) }
    .fcard span { font-size: 32px; font-weight: 800 }
    .f1 { animation: fpop var(--T) infinite } .f2 { animation: fpop2 var(--T) infinite }
    .f3 { animation: fpop3 var(--T) infinite } .f4 { animation: fpop4 var(--T) infinite }
    @keyframes fpop { 0%,60%{opacity:0;transform:scale(.6) translateY(20px)} 63%{opacity:1;transform:none} 100%{opacity:1} }
    @keyframes fpop2 { 0%,62%{opacity:0;transform:scale(.6) translateY(20px)} 65%{opacity:1;transform:none} 100%{opacity:1} }
    @keyframes fpop3 { 0%,64%{opacity:0;transform:scale(.6) translateY(20px)} 67%{opacity:1;transform:none} 100%{opacity:1} }
    @keyframes fpop4 { 0%,66%{opacity:0;transform:scale(.6) translateY(20px)} 69%{opacity:1;transform:none} 100%{opacity:1} }

    /* Scene 5 — CTA */
    .cta-free { font-size: 34px; font-weight: 800; color: var(--lime); margin-bottom: 8px }
    .cta-title { font-size: 84px; font-weight: 900; line-height: 1.15 }
    .stores { display: flex; gap: 22px; margin-top: 44px }
    .store { display: inline-flex; align-items: center; gap: 14px; background: #fff; color: #14210C; font-weight: 800; padding: 18px 30px; border-radius: 18px; font-size: 28px; box-shadow: 0 16px 36px rgba(0,0,0,.35) }
    .store i { font-size: 40px }
    .cta-foot { margin-top: 40px; font-size: 30px; color: var(--soft); font-weight: 700 }
    .cta-foot b { color: #fff }

    /* progress bar */
    .progress { position: absolute; left: 0; bottom: 0; height: 8px; background: var(--grad); width: 0; animation: prog var(--T) linear infinite; z-index: 7 }
    @keyframes prog { from { width: 0 } to { width: 100% } }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important } }
  </style>
</head>

<body>
  <div class="stage" id="stage">
    <div class="grid-bg"></div>
    <span class="blob a"></span><span class="blob b"></span>

    <div class="watermark"><img src="assets/img/Yusr.png" alt="يُسر"><b>يُسر</b></div>

    <!-- Scene 1: Brand -->
    <div class="scene sc1">
      <div class="badge-logo"><img src="assets/img/Yusr.png" alt="يُسر"></div>
      <div class="brand-name">يُسر</div>
      <div class="brand-sub">وسيطك الرقمي لتوثيق الحقوق</div>
      <div class="rule"></div>
    </div>

    <!-- Scene 2: Problem -->
    <div class="scene sc2">
      <div class="paper"><span class="x-mark"><i class="fas fa-xmark"></i></span></div>
      <h2 class="line">دفاتر الديون الورقية<br><span class="g">تضيع معها حقوقك</span></h2>
    </div>

    <!-- Scene 3: AUREX tap -->
    <div class="scene sc3">
      <div class="tap">
        <div class="phone left"><img src="assets/img/Yusr.png" alt=""><span class="ln"></span><span class="ln s"></span></div>
        <div class="phone right"><img src="assets/img/Yusr.png" alt=""><span class="ln"></span><span class="ln s"></span></div>
        <span class="pulse"></span>
      </div>
      <h2 class="line">لمسة <span class="g">تُوثّق</span>، لا تدفع</h2>
      <span class="check-badge"><i class="fas fa-circle-check"></i> تم التوثيق فوراً</span>
      <div class="aurex-tag">بتقنية AUREX</div>
    </div>

    <!-- Scene 4: Features -->
    <div class="scene sc4">
      <div class="feat-grid">
        <div class="fcard f1"><i class="fas fa-fingerprint"></i><span>توثيق فوري بلمسة</span></div>
        <div class="fcard f2"><i class="fas fa-lock"></i><span>غير قابل للتلاعب</span></div>
        <div class="fcard f3"><i class="fas fa-wifi"></i><span>يعمل بلا إنترنت</span></div>
        <div class="fcard f4"><i class="fas fa-mobile-screen"></i><span>على كل الأجهزة</span></div>
      </div>
    </div>

    <!-- Scene 5: CTA -->
    <div class="scene sc5">
      <div class="cta-free"><i class="fas fa-gift"></i> مجاني للأفراد بالكامل</div>
      <div class="cta-title">حمّل <span class="g">يُسر</span> الآن<br>ووثّق حقّك</div>
      <div class="stores">
        <span class="store"><i class="fab fa-apple"></i> App Store</span>
        <span class="store"><i class="fab fa-google-play"></i> Google Play</span>
      </div>
      <div class="cta-foot">وثّق الآن، والسداد <b>لاحقاً</b> — بكل يُسر</div>
    </div>

    <div class="progress"></div>
  </div>

  <script>
    function fit() {
      var s = Math.min(window.innerWidth, window.innerHeight) / 1080;
      document.getElementById('stage').style.setProperty('--s', s);
    }
    window.addEventListener('resize', fit); fit();
  </script>
</body>

</html>
